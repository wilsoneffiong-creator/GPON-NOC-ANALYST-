<!DOCTYPE html>
<html>
<head>
    <title>GPON NOC Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .status-good { color: green; font-weight: bold; }
        .status-bad { color: red; font-weight: bold; }
        .card { margin-top: 20px; }
    </style>
</head>
<body class="bg-light">
    <div class="container">
        <h1 class="mt-4">GPON NOC Dashboard</h1>
        <p class="text-muted">Automated ONU Health Monitoring</p>
        
        <div class="row">
            <div class="col-md-3">
                <div class="card text-white bg-primary">
                    <div class="card-body">
                        <h5>Total ONUs</h5>
                        <h2>{{ total }}</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-white bg-success">
                    <div class="card-body">
                        <h5>Online</h5>
                        <h2>{{ online }}</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-white bg-danger">
                    <div class="card-body">
                        <h5>Bad Signal</h5>
                        <h2>{{ bad }}</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-white bg-info">
                    <div class="card-body">
                        <h5>Port Health</h5>
                        <h2>{{ health }}%</h2>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mt-4">
            <div class="card-header">
                <h4>ONU Details</h4>
            </div>
            <div class="card-body">
                {{ table | safe }}
                <a href="/download" class="btn btn-success mt-3">Download Excel Report</a>
            </div>
        </div>
    </div>
</body>
</html>
